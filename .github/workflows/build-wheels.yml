name: Test binary wheels

"on":
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: test-wheels-${{ github.ref }}
  cancel-in-progress: true

env:
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BUILD_FRONTEND: "build"
  CIBW_CONFIG_SETTINGS_WINDOWS: "setup-args=--vsenv"
  CIBW_TEST_ENVIRONMENT: "PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 MPLBACKEND=Agg QT_QPA_PLATFORM=minimal"
  CIBW_TEST_REQUIRES: pytest
  CIBW_TEST_COMMAND: >-
    python -c "from orgui.datautils.xrayutils import CTRuc;
    assert CTRuc.HAS_CPP_ACCEL;
    CTRuc.set_ctr_accel_backend('cpp');
    print('CTR_ACCEL_BACKEND=', CTRuc.CTR_ACCEL_BACKEND)" &&
    pytest {project}/orgui/datautils/xrayutils/test/test_CTRcalc.py
  CIBW_TEST_SKIP: "*-manylinux_aarch64"

jobs:
  manual-wheels:
    name: Manual ${{ matrix.name }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            cibw_archs: x86_64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            artifact: linux-x86_64
          - name: Linux aarch64
            os: ubuntu-latest
            cibw_archs: aarch64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            artifact: linux-aarch64
          - name: macOS x86_64
            os: macos-13
            cibw_archs: x86_64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            artifact: macos-x86_64
          - name: macOS arm64
            os: macos-14
            cibw_archs: arm64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            artifact: macos-arm64
          - name: Windows x86_64
            os: windows-latest
            cibw_archs: AMD64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            artifact: windows-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up QEMU
        if: runner.os == 'Linux' && matrix.cibw_archs == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: ${{ matrix.cibw_build }}
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manual-wheels-${{ matrix.artifact }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  master-smoke-wheels:
    name: Master smoke ${{ matrix.name }}
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 cp310
            os: ubuntu-latest
            cibw_archs: x86_64
            cibw_build: "cp310-manylinux_x86_64"
            artifact: linux-x86_64-cp310
          - name: Linux x86_64 cp314
            os: ubuntu-latest
            cibw_archs: x86_64
            cibw_build: "cp314-manylinux_x86_64"
            artifact: linux-x86_64-cp314
          - name: macOS arm64 cp314
            os: macos-14
            cibw_archs: arm64
            cibw_build: "cp314-macosx_arm64"
            artifact: macos-arm64-cp314
          - name: Windows x86_64 cp314
            os: windows-latest
            cibw_archs: AMD64
            cibw_build: "cp314-win_amd64"
            artifact: windows-x86_64-cp314

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: ${{ matrix.cibw_build }}
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: master-smoke-wheels-${{ matrix.artifact }}
          path: wheelhouse/*.whl
          if-no-files-found: error
