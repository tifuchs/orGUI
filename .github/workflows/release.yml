name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Extract release notes from CHANGELOG.md
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          if not match:
              print(f"CHANGELOG.md has no release section for {version!r}.", file=sys.stderr)
              print("Add the manual release notes, commit them, and move/recreate the tag.", file=sys.stderr)
              sys.exit(1)

          Path("release-notes.md").write_text(match.group(0).strip() + "\n", encoding="utf-8")
          PY

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  build-wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 wheels
            os: ubuntu-latest
            cibw_archs: x86_64
            artifact: linux-x86_64
          - name: Linux aarch64 wheels
            os: ubuntu-latest
            cibw_archs: aarch64
            artifact: linux-aarch64
          - name: macOS x86_64 wheels
            os: macos-13
            cibw_archs: x86_64
            artifact: macos-x86_64
          - name: macOS arm64 wheels
            os: macos-14
            cibw_archs: arm64
            artifact: macos-arm64
          - name: Windows x86_64 wheels
            os: windows-latest
            cibw_archs: AMD64
            artifact: windows-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up QEMU
        if: runner.os == 'Linux' && matrix.cibw_archs == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BUILD_FRONTEND: "build"
          CIBW_CONFIG_SETTINGS_WINDOWS: "setup-args=--vsenv"
          CIBW_TEST_ENVIRONMENT: "PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 MPLBACKEND=Agg QT_QPA_PLATFORM=minimal"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: >-
            python -c "from orgui.datautils.xrayutils import CTRuc;
            assert CTRuc.HAS_CPP_ACCEL;
            CTRuc.set_ctr_accel_backend('cpp');
            print('CTR_ACCEL_BACKEND=', CTRuc.CTR_ACCEL_BACKEND)" &&
            pytest --pyargs orgui.datautils.xrayutils.test.test_CTRcalc
          CIBW_TEST_SKIP: "*-manylinux_aarch64"
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  release:
    name: Create release and publish
    runs-on: ubuntu-latest
    needs:
      - build
      - build-wheels
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
